services:

  # ── Base de datos ────────────────────────────────────────────────────────────
  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - backend
    # El puerto de postgres NO se expone al host; solo es accesible internamente
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Servicio web (réplicas) ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_URL: ${DB_URL}
      DB_USER_NAME: ${DB_USER_NAME}
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - frontend
      - backend
    # El puerto 8080 NO se expone al host; solo nginx puede alcanzarlo
    depends_on:
      db:
        condition: service_healthy
    deploy:
      replicas: 3

  # ── Balanceador de carga ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"        # Único puerto expuesto al exterior
    networks:
      - frontend
    depends_on:
      - app

networks:
  # Red interna: app <-> db (sin acceso externo)
  backend:
    driver: bridge
    internal: true
  # Red frontend: nginx <-> app
  frontend:
    driver: bridge
