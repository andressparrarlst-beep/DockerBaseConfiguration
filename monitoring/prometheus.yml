global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:

  # ── Prometheus se monitorea a sí mismo ───────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Métricas del HOST (CPU, RAM, disco, red) ─────────────────────────────
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  # ── Métricas de CONTENEDORES (por contenedor: CPU, RAM, red, I/O) ────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # ── Métricas de la APP Spring Boot (Actuator + Micrometer) ───────────────
  - job_name: 'spring_app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']

  # ── Métricas de PostgreSQL ────────────────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
